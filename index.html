    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'eid-green': '#064e3b',
                        'eid-light': '#059669',
                        'eid-gold': '#fbbf24',
                        'eid-gold-light': '#fde68a',
                        'wood': '#8B4513',
                        'wood-light': '#A0522D',
                        'skin': '#F5DEB3',
                    },
                    fontFamily: {
                        'sans': ['Poppins', 'sans-serif'],
                        'serif': ['Amiri', 'serif'],
                        'script': ['Great Vibes', 'cursive'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 8s ease-in-out 2s infinite',
                        'swing': 'swing 3s ease-in-out infinite alternate',
                        'swing-delayed': 'swing 4s ease-in-out 1s infinite alternate',
                        'fade-in-up': 'fadeInUp 1s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                        'swing-in': 'swingIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'particle-float': 'particleFloat 10s linear infinite',
                        // Animasi Salaman Baru
                        'bow-left': 'bowLeft 3s ease-in-out infinite',
                        'bow-right': 'bowRight 3s ease-in-out infinite',
                        'reach-left': 'reachLeft 3s ease-in-out infinite',
                        'reach-right': 'reachRight 3s ease-in-out infinite',
                        'heart-beat': 'heartBeat 1.5s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        swing: {
                            '0%': { transform: 'rotate(-8deg)' },
                            '100%': { transform: 'rotate(8deg)' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        swingIn: {
                            '0%': { opacity: '0', transform: 'translateY(60px) rotate(-10deg)' },
                            '100%': { opacity: '1', transform: 'translateY(0) rotate(0deg)' },
                        },
                        particleFloat: {
                            '0%': { transform: 'translateY(100vh) scale(0)', opacity: '0' },
                            '20%': { opacity: '1' },
                            '80%': { opacity: '0.8' },
                            '100%': { transform: 'translateY(-20vh) scale(1)', opacity: '0' },
                        },
                        // Keyframes Salaman Baru
                        bowLeft: {
                            '0%, 100%': { transform: 'rotate(0deg)' },
                            '50%': { transform: 'rotate(8deg)' },
                        },
                        bowRight: {
                            '0%, 100%': { transform: 'rotate(0deg)' },
                            '50%': { transform: 'rotate(-8deg)' },
                        },
                        reachLeft: {
                            '0%, 100%': { transform: 'rotate(0deg)' },
                            '50%': { transform: 'rotate(-15deg)' },
                        },
                        reachRight: {
                            '0%, 100%': { transform: 'rotate(0deg)' },
                            '50%': { transform: 'rotate(15deg)' },
                        },
                        heartBeat: {
                            '0%, 100%': { transform: 'scale(1)', opacity: '0.5' },
                            '50%': { transform: 'scale(1.3)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Sembunyikan cursor default hanya di perangkat desktop */
        @media (pointer: fine) {
            body { cursor: none; }
            a, button, .clickable { cursor: none !important; }
        }

        /* Hilangkan tap highlight di mobile agar tombol tidak loncat */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #064e3b; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 4px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .text-gradient-gold {
            background: linear-gradient(to right, #fbbf24, #fde68a, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .stagger-1 { animation-delay: 0.2s; }
        .stagger-2 { animation-delay: 0.5s; }
        .stagger-3 { animation-delay: 0.8s; }
        .stagger-4 { animation-delay: 1.1s; }
        .stagger-5 { animation-delay: 1.4s; }
        .stagger-6 { animation-delay: 1.7s; }
        .stagger-7 { animation-delay: 2.0s; } /* Tambahan Stagger baru */

        /* SVG Patterns */
        .bg-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23fbbf24' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* Bedug Animations */
        #bedug-stick {
            transform-origin: 15px 40px;
        }
        @keyframes hitStick {
            0%, 100% { transform: rotate(0deg); }
            40% { transform: rotate(45deg); }
            60% { transform: rotate(-10deg); }
        }
        @keyframes shakeDrum {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-3px) rotate(-1deg); }
            40% { transform: translateX(3px) rotate(1deg); }
            60% { transform: translateX(-3px) rotate(-1deg); }
            80% { transform: translateX(3px) rotate(1deg); }
        }
        .anim-hit-stick { animation: hitStick 0.3s ease-in-out; }
        .anim-shake-drum { animation: shakeDrum 0.3s ease-in-out; }

        /* Pop text DUG animation */
        @keyframes popUpFade {
            0% { opacity: 1; transform: translateY(0) scale(0.5); }
            50% { transform: translateY(-30px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-50px) scale(1); }
        }
        .pop-text {
            /* Perbaikan Penting: fixed mencegah lompatan layout halaman saat text muncul */
            position: fixed; 
            z-index: 9999;
            color: #fbbf24;
            font-weight: bold;
            font-size: 1.5rem;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: popUpFade 0.8s ease-out forwards;
        }
    </style>
</head>

                <line x1="40" y1="170" x2="80" y2="100" stroke="#8B4513" stroke-width="8" stroke-linecap="round"/>
                <line x1="160" y1="170" x2="120" y2="100" stroke="#8B4513" stroke-width="8" stroke-linecap="round"/>
                <line x1="80" y1="100" x2="120" y2="100" stroke="#8B4513" stroke-width="8"/>
                <line x1="50" y1="145" x2="150" y2="145" stroke="#8B4513" stroke-width="6"/>
                
                <g id="drum-body">
                    <!-- Badan Bedug Belakang -->
                    <ellipse cx="140" cy="90" rx="15" ry="40" fill="#DEB887"/>
                    <!-- Tabung Kayu Bedug -->
                    <path d="M 60 50 Q 100 45 140 50 L 140 130 Q 100 135 60 130 Z" fill="#A0522D"/>
                    <path d="M 60 50 L 140 50 M 60 130 L 140 130 M 60 90 L 140 90" stroke="#6b3410" stroke-width="2" stroke-dasharray="4 4"/>
                    <!-- Kulit Bedug Depan -->
                    <ellipse cx="60" cy="90" rx="15" ry="40" fill="#F5DEB3" stroke="#8B4513" stroke-width="2"/>
                    <!-- Paku/Paku payung keliling -->
                    <circle cx="50" cy="60" r="2" fill="#333"/><circle cx="48" cy="75" r="2" fill="#333"/>
                    <circle cx="46" cy="90" r="2" fill="#333"/><circle cx="48" cy="105" r="2" fill="#333"/>
                    <circle cx="50" cy="120" r="2" fill="#333"/>
                </g>

                <!-- Alat Pemukul (Stick) -->
                <g transform="translate(15, 30)">
                    <g id="bedug-stick">
                        <rect x="15" y="0" width="6" height="40" fill="#8B4513" rx="2" transform="rotate(-30 15 40)"/>
                        <!-- Ujung pemukul -->
                        <circle cx="0" cy="5" r="10" fill="#D2B48C"/>
                    </g>
                </g>
            </svg>
        </div>
    </div>

    <!-- Interactive Script -->
    <script>
        // Custom Cursor Logic
        document.addEventListener('DOMContentLoaded', () => {
            const cursor = document.getElementById('custom-cursor');
            let isMouseAvailable = window.matchMedia("(pointer: fine)").matches;

            if (isMouseAvailable) {
                cursor.style.display = 'block';

                document.addEventListener('mousemove', (e) => {
                    requestAnimationFrame(() => {
                        cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
                    });
                });

                document.addEventListener('mousedown', () => {
                    cursor.querySelector('svg').style.transform = 'scale(0.8)';
                });
                document.addEventListener('mouseup', () => {
                    cursor.querySelector('svg').style.transform = 'scale(1)';
                });

                document.addEventListener('mouseenter', () => cursor.style.opacity = '1');
                document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
            }

            // Generate Floating Particles
            generateParticles();

            // Mulai Efek Kembang Api (Petasan)
            initFireworks();
            
            // Mulai Hitung Mundur Lebaran
            initCountdown();

            // Jalankan Animasi Scroll (Intersection Observer)
            initScrollAnimations();

            // Coba putar musik otomatis saat halaman dimuat
            initAutoMusic();
        });

        // Setup Web Audio API untuk Suara Bedug Realistis
        let audioCtx;
        function playDrumSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            // Frekuensi rendah khas bedug
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.5);
            
            // Efek memudar (fade out)
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            osc.type = 'sine';
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // Bedug Animation Logic
        function playBedug(event) {
            // Hentikan default agar tidak ada double trigger
            if (event && typeof event.preventDefault === 'function') {
                event.preventDefault();
            }

            const stick = document.getElementById('bedug-stick');
            const drum = document.getElementById('drum-body');

            // Hapus class animasi sebelumnya
            stick.classList.remove('anim-hit-stick');
            drum.classList.remove('anim-shake-drum');

            // Gunakan trik requestAnimationFrame ganda agar animasi ter-reset sempurna di elemen SVG
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    stick.classList.add('anim-hit-stick');
                    drum.classList.add('anim-shake-drum');
                });
            });

            // Mainkan Suara Bedug Asli
            playDrumSound();

            // Tangkap koordinat sentuhan/klik untuk letak teks pop-up secara akurat
            let xPos = null;
            let yPos = null;
            
            if (event) {
                if(event.type && event.type.includes('touch') && event.changedTouches && event.changedTouches.length > 0) {
                    xPos = event.changedTouches[0].clientX;
                    yPos = event.changedTouches[0].clientY;
                } else if (event.clientX !== undefined) {
                    xPos = event.clientX;
                    yPos = event.clientY;
                }
            }

            if (xPos === null || yPos === null) {
                 const rect = document.getElementById('bedug-wrapper').getBoundingClientRect();
                 xPos = rect.left + rect.width / 2;
                 yPos = rect.top;
            }

            createPopText(xPos, yPos);
            
            // Optional: Jika ingin ada getaran di HP (hanya jalan di HP yg support)
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }

        // Tambahkan event listener khusus 'touchend' untuk bedug agar responsif di HP
        document.getElementById('bedug-wrapper').addEventListener('touchend', playBedug, {passive: false});

        // Fungsi Autoplay & Update UI Musik
        let isMusicPlaying = false;
        
        function updateMusicUI(playing) {
            const icon = document.getElementById('music-icon');
            const text = document.getElementById('music-text');
            if (playing) {
                icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                text.innerText = 'Jeda Musik';
            } else {
                icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                text.innerText = 'Putar Musik';
            }
        }

        function initAutoMusic() {
            const music = document.getElementById('bg-music');
            
            const playPromise = music.play();
            
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    isMusicPlaying = true;
                    updateMusicUI(true);
                }).catch(error => {
                    isMusicPlaying = false;
                    updateMusicUI(false); 
                    
                    document.body.addEventListener('click', function playOnFirstClick() {
                        if (!isMusicPlaying) {
                            music.play();
                            isMusicPlaying = true;
                            updateMusicUI(true);
                        }
                        document.body.removeEventListener('click', playOnFirstClick);
                    }, { once: true });
                });
            }
        }

        function toggleMusic(event) {
            if (event) {
                event.stopPropagation(); 
                if (typeof event.preventDefault === 'function') {
                    event.preventDefault(); 
                }
            }
            const music = document.getElementById('bg-music');
            
            if (isMusicPlaying) {
                music.pause();
                isMusicPlaying = false;
            } else {
                music.play().catch(e => console.log("Audio block:", e));
                isMusicPlaying = true;
            }
            updateMusicUI(isMusicPlaying);
        }

        // Tambahkan event listener khusus 'touchend' untuk musik
        document.querySelector('[onclick="toggleMusic(event)"]').addEventListener('touchend', toggleMusic, {passive: false});

        // Fungsi Hitung Mundur Lebaran
        function initCountdown() {
            const countDownDate = new Date("March 20, 2026 00:00:00").getTime();

            const x = setInterval(function() {
                const now = new Date().getTime();
                const distance = countDownDate - now;

                if (distance < 0) {
                    clearInterval(x);
                    document.getElementById("cd-days").innerText = "00";
                    document.getElementById("cd-hours").innerText = "00";
                    document.getElementById("cd-mins").innerText = "00";
                    document.getElementById("cd-secs").innerText = "00";
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("cd-days").innerText = days.toString().padStart(2, '0');
                document.getElementById("cd-hours").innerText = hours.toString().padStart(2, '0');
                document.getElementById("cd-mins").innerText = minutes.toString().padStart(2, '0');
                document.getElementById("cd-secs").innerText = seconds.toString().padStart(2, '0');
            }, 1000);
        }

        // Fungsi Bikin Tulisan Melayang
        function createPopText(x, y) {
            const texts = ["DUG!", "DERR!", "DUG DUG!"];
            const randomText = texts[Math.floor(Math.random() * texts.length)];
            
            const pop = document.createElement('div');
            pop.className = 'pop-text';
            pop.innerText = randomText;
            
            // Posisi di sekitar mouse/klik
            pop.style.left = (x - 20 + (Math.random() * 40 - 20)) + 'px';
            pop.style.top = (y - 50) + 'px';
            
            document.body.appendChild(pop);

            // Bersihkan elemen setelah animasi selesai (800ms)
            setTimeout(() => {
                pop.remove();
            }, 800);
        }

        // Fungsi Bikin Partikel Bintang/Cahaya melayang
        function generateParticles() {
            const container = document.getElementById('particles-container');
            const particleCount = 20; // Jumlah partikel
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                
                const size = Math.random() * 6 + 2; 
                const leftPos = Math.random() * 100; 
                const delay = Math.random() * 10; 
                const duration = Math.random() * 10 + 10; 
                
                particle.className = 'absolute rounded-full bg-eid-gold mix-blend-screen opacity-0 animate-particle-float';
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${leftPos}%`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;
                
                if(size > 5) {
                    particle.style.filter = 'blur(1px)';
                }

                container.appendChild(particle);
            }
        }

        // Fungsi Bikin Efek Kembang Api (Petasan) Warna-warni
        function initFireworks() {
            const canvas = document.createElement('canvas');
            canvas.id = 'fireworks-canvas';
            // Letakkan di belakang konten tapi di atas background
            canvas.className = 'fixed inset-0 pointer-events-none z-[5] w-full h-full';
            document.body.insertBefore(canvas, document.body.firstChild);
            const ctx = canvas.getContext('2d');

            let width, height;
            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const particles = [];
            const fireworks = [];
            // Palet warna warni meriah
            const colors = ['#fbbf24', '#fde68a', '#10b981', '#34d399', '#f472b6', '#60a5fa', '#a78bfa', '#ef4444', '#3b82f6'];

            class Particle {
                constructor(x, y, color) {
                    this.x = x;
                    this.y = y;
                    this.color = color;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 5 + 1; // Kecepatan ledakan
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.alpha = 1;
                    this.decay = Math.random() * 0.015 + 0.01; // Kecepatan pudar
                    this.gravity = 0.05;
                    this.size = Math.random() * 2 + 1;
                }
                update() {
                    this.vy += this.gravity;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.alpha -= this.decay;
                }
                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.restore();
                }
            }

            class Firework {
                constructor() {
                    this.x = Math.random() * (width * 0.8) + (width * 0.1); // Meluncur di 80% area tengah layar
                    this.y = height;
                    this.targetY = height * 0.1 + Math.random() * height * 0.3; // Meledak di 10%-40% layar atas
                    this.speed = Math.random() * 4 + 4; // Kecepatan luncur
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.dead = false;
                    this.trail = [];
                }
                update() {
                    this.trail.push({x: this.x, y: this.y});
                    if(this.trail.length > 5) this.trail.shift();

                    this.y -= this.speed;
                    if (this.y <= this.targetY) {
                        this.dead = true;
                        explode(this.x, this.y, this.color);
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    
                    // Gambar ekor peluncuran
                    if(this.trail.length > 0) {
                        ctx.beginPath();
                        ctx.moveTo(this.trail[0].x, this.trail[0].y);
                        for(let i=1; i<this.trail.length; i++) {
                            ctx.lineTo(this.trail[i].x, this.trail[i].y);
                        }
                        ctx.strokeStyle = this.color;
                        ctx.lineWidth = 1;
                        ctx.globalAlpha = 0.5;
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            }

            function explode(x, y, coreColor) {
                const particleCount = Math.floor(Math.random() * 40 + 40); // 40-80 partikel percikan
                for (let i = 0; i < particleCount; i++) {
                    // Campur warna inti dengan warna lain atau putih
                    const pColor = Math.random() > 0.3 ? coreColor : (Math.random() > 0.5 ? '#ffffff' : colors[Math.floor(Math.random() * colors.length)]);
                    particles.push(new Particle(x, y, pColor));
                }
            }

            function loop() {
                requestAnimationFrame(loop);
                ctx.clearRect(0, 0, width, height); // Bersihkan canvas tanpa menghilangkan background web
                
                // Peluang luncurkan kembang api baru (atur frekuensi di sini)
                if (Math.random() < 0.03) { 
                    fireworks.push(new Firework());
                }

                for (let i = fireworks.length - 1; i >= 0; i--) {
                    const f = fireworks[i];
                    f.update();
                    f.draw();
                    if (f.dead) fireworks.splice(i, 1);
                }

                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.update();
                    p.draw();
                    if (p.alpha <= 0) particles.splice(i, 1);
                }
            }
            loop();
        }

        // Fungsi Animasi Scroll (Memunculkan Elemen Saat Di-scroll)
        function initScrollAnimations() {
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.15 
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-swing-in');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.reveal-on-scroll').forEach((el) => {
                observer.observe(el);
            });
        }
    </script>
</body>
</html>
